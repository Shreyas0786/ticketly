name: CI

# Run the test suite on every PR and on pushes to main, across the full range
# of still-supported Python 3 versions (matches requires-python = ">=3.10" in
# pyproject.toml). No publish step here — releases stay a deliberate manual
# `twine upload`; this workflow only gates correctness.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
